<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時蘊設計 Z-YUN A+U DESIGN</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── Fixed Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo-zh-group">
        <a href="#hero" class="logo-link" aria-label="時蘊設計 首頁">
          <img class="logo-img" src="時蘊設計LOGO.png" alt="時蘊設計">
        </a>
        <span class="brand-zh">時蘊設計</span>
      </div>
      <span class="brand-en">Z-YUN A+U DESIGN</span>
    </div>

    <div class="sidebar-tagline">
      <p class="tagline-text">時間，慢慢醞釀成一個作品</p>
    </div>

    <nav class="sidebar-nav" aria-label="主選單">
      <a href="#projects" class="nav-link">Projects</a>
      <a href="#about"    class="nav-link">About</a>
      <a href="#contact"  class="nav-link">Contact</a>
    </nav>
  </aside>

  <!-- ── Main Content ── -->
  <main class="main-content">

    <!-- HERO -->
    <section id="hero" class="section hero-section">
      <div class="hero-carousel">
        <!-- slides injected by main.js from content.js -->
      </div>
      <div class="hero-panel">
        <blockquote class="hero-quote">
          空間不是裝飾<br>
          而是時間累積出的<br>
          生活容器
        </blockquote>
        <a href="#projects" class="hero-cta">查看作品 ↓</a>
      </div>
    </section>

    <!-- PROJECTS — generated by main.js -->
    <section id="projects" class="projects-section">
      <div class="projects-header">
        <span class="label-en">Projects</span>
      </div>
      <!-- project articles injected here -->
    </section>

    <!-- ABOUT -->
    <section id="about" class="section about-section">
      <div class="about-inner">
        <div class="about-left">
          <p class="label-en" style="margin-bottom:44px;display:block;">About</p>
          <p class="about-philosophy" id="about-philosophy"></p>
          <p class="about-body"      id="about-story"></p>
        </div>
      </div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="section contact-section">
      <div class="contact-inner">
        <p class="label-en contact-label-top">Contact</p>

        <!-- Designer card sits above contact rows -->
        <div class="contact-designer">
          <p class="contact-designer-role"  id="designer-role"></p>
          <h3 class="contact-designer-name" id="designer-name-zh"></h3>
          <p class="contact-designer-en"    id="designer-name-en"></p>
        </div>

        <div class="contact-list" id="contact-list">
          <!-- rows injected by main.js -->
        </div>
        <p class="contact-company" id="contact-company"></p>
      </div>
    </section>

  </main>

  <script src="content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
